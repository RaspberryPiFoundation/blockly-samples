# This workflow handles releasing all of the packages in samples.

name: publish

on:
  workflow_dispatch: # Manually trigger. Colon is required.
    inputs:
      version:
        description: 'Version to publish all (non-private) plugins as.'
        required: true
        type: string
        default: '13.1.0'
      from-package:
        description: 'Check to publish from-package instead of the default publish. This skips versioning and publishes any package whose package.json version is not yet on npm. Use this to retry a partially-failed run, or to publish a plugin that was previously held back as private (set its version + remove private first).'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write # Required for OIDC.
  contents: write # For checkout and tag.
  packages: write # For publish.

jobs:
  publish:
    runs-on: ubuntu-latest
    # Don't try to publish from a fork of RaspberryPiFoundation/blockly-samples.
    if: ${{ github.repository_owner == 'RaspberryPiFoundation' }}

    # Environment specific to releasing so we can isolate the npm token.
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # fetch all tags and commits so that lerna can version appropriately
        with:
          fetch-depth: 0
          ref: 'main'

      # This uses a reverse-engineered email for the github actions bot. See
      # https://github.com/actions/checkout/issues/13#issuecomment-724415212
      - name: Git Identity
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '<41898282+github-actions[bot]@users.noreply.github.com'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: NPM install
        # Use CI so that we don't update dependencies in this step.
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FROM_PACKAGE: ${{ github.event.inputs['from-package'] }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          cd plugins
          if [ "${FROM_PACKAGE}" = "true" ]; then
            npx lerna publish from-package --no-private --yes --loglevel silly
          else
            npx lerna publish "${VERSION}" --no-private --force-publish --conventional-commits --create-release github --yes --loglevel silly
          fi

  update-gh-pages:
    name: Update GitHub Pages
    # Call the Update gh-pages workflow only if publishing succeeds
    needs: [publish]
    # Don't try to auto-update if on a fork of RaspberryPiFoundation/blockly-samples.
    if: ${{ github.repository_owner == 'RaspberryPiFoundation' }}
    uses: ./.github/workflows/update_gh_pages.yml
